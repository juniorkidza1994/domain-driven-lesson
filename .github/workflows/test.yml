name: test
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium
      - name: Unit — schema
        run: node --test tests/unit/validate-schema.js
      - name: Unit — research
        run: node --test tests/unit/validate-research.js
      - name: Unit — claude-md
        run: node --test tests/unit/validate-claude-md.js
      - name: Start static server
        run: python3 -m http.server 8080 &
      - name: Wait for server
        run: npx wait-on http://localhost:8080/index.html
      - name: E2E smoke
        run: npx playwright test tests/e2e/smoke.spec.js
