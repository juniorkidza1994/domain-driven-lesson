name: test
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium firefox webkit
      - name: Unit — schema
        run: node --test tests/unit/validate-schema.js
      - name: Unit — research
        run: node --test tests/unit/validate-research.js
      - name: Unit — claude-md
        run: node --test tests/unit/validate-claude-md.js
      - name: Unit — paths
        run: node --test tests/unit/validate-paths.js
      - name: E2E — full suite (chromium + firefox + webkit)
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
