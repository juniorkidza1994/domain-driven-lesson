name: test
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Unit — schema
        run: node --test tests/unit/validate-schema.js
      - name: Unit — research
        run: node --test tests/unit/validate-research.js
      - name: Unit — claude-md
        run: node --test tests/unit/validate-claude-md.js
      - name: Unit — paths
        run: node --test tests/unit/validate-paths.js
